<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Detail — Subscription Manager</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header" id="app-header"></header>

    <div class="app-layout">
        <aside class="app-sidebar" id="app-nav"></aside>

        <main class="app-main">
            <div id="setup-banner"></div>
            <div id="org-detail" style="display:none;">
                <div class="loader"><div class="spinner"></div><p>Loading organization...</p></div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/github-api.js"></script>
    <script src="../js/export.js"></script>
    <script src="../lib/html2pdf.bundle.min.js" defer></script>

    <script>
        let currentIssue = null;
        let currentParsed = null;

        document.addEventListener('DOMContentLoaded', () => {
            Header.render([
                { label: 'Organizations', url: `${CONFIG.baseUrl}/organizations/` },
                { label: 'Detail' }
            ]);
            Nav.render('organizations');
            Auth.renderSetupBanner('setup-banner');
            if (Auth.isAuthenticated()) onAuthReady();
        });

        async function onAuthReady() {
            document.getElementById('org-detail').style.display = '';
            await loadOrganization();
        }

        async function loadOrganization() {
            const id = Utils.getQueryParam('id');
            if (!id) {
                document.getElementById('org-detail').innerHTML = '<div class="empty-state"><h3>No organization ID provided</h3><a href="../organizations/" class="btn btn-primary">Back to list</a></div>';
                return;
            }

            try {
                currentIssue = await GitHubAPI.getOrganization(parseInt(id));
                currentParsed = Utils.parseIssueBody(currentIssue.body);
                renderDetail();
            } catch (error) {
                document.getElementById('org-detail').innerHTML = `<div class="empty-state"><h3>Failed to load</h3><p>${Utils.escapeHtml(error.message)}</p><button class="btn btn-primary" onclick="loadOrganization()">Retry</button></div>`;
            }
        }

        function renderDetail() {
            const org = currentParsed.organization;
            const alerts = currentParsed.alerts;
            const subs = currentParsed.subscriptions;
            const payment = currentParsed.payment;
            const paymentHistory = currentParsed.paymentHistory || [];
            const notes = currentParsed.notes;
            const expiryDate = Utils.getEarliestExpiry(subs);
            const hasRenewal = currentIssue.labels.nodes.some(l => l.name === CONFIG.labels.status.renewalInProgress);
            const days = expiryDate ? Utils.remainingDays(expiryDate) : null;
            const paySummary = Utils.calculatePaymentSummary(payment, paymentHistory);

            const statusHtml = hasRenewal
                ? `<span class="badge badge-info">${CONFIG.labels.status.renewalInProgress}</span>`
                : (expiryDate ? Utils.statusBadge(expiryDate) : '<span class="badge badge-default">Unknown</span>');

            const labelsHtml = currentIssue.labels.nodes
                .filter(l => !Object.values(CONFIG.labels.status).includes(l.name))
                .map(l => `<span class="badge badge-default">${Utils.escapeHtml(l.name)}</span>`)
                .join(' ');

            // Audit log (comments)
            const auditComments = currentIssue.comments.nodes.filter(c =>
                c.body.startsWith('✏️') || c.body.startsWith('🤖') || c.body.startsWith('📄') || c.body.startsWith('📧')
            );
            const otherComments = currentIssue.comments.nodes.filter(c =>
                !c.body.startsWith('✏️') && !c.body.startsWith('🤖') && !c.body.startsWith('📄') && !c.body.startsWith('📧')
            );

            document.getElementById('org-detail').innerHTML = `
                <!-- Header -->
                <div class="page-header">
                    <div>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <h1 class="page-title">${Utils.escapeHtml(currentIssue.title)}</h1>
                            ${statusHtml}
                        </div>
                        <p class="page-subtitle">
                            #${currentIssue.number} · Created ${Utils.formatDate(currentIssue.createdAt)}
                            ${days !== null ? ` · ${days > 0 ? days + ' days remaining' : Math.abs(days) + ' days overdue'}` : ''}
                        </p>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-secondary" onclick="exportOrgPDF()">Export PDF ⬇</button>
                        <a href="${currentIssue.html_url || `https://github.com/${CONFIG.owner}/${CONFIG.repo}/issues/${currentIssue.number}`}" target="_blank" class="btn btn-secondary">View on GitHub</a>
                        <button class="btn btn-secondary" onclick="toggleEdit()">Edit</button>
                        ${currentIssue.state === 'OPEN' ? `<button class="btn btn-danger" onclick="handleDelete()">Delete</button>` : ''}
                    </div>
                </div>

                <div class="detail-grid">
                    <!-- Organization Info -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Organization Details</h3>
                            ${labelsHtml}
                        </div>
                        <div class="detail-table">
                            ${detailRow('Contact Person', org['Contact Person'])}
                            ${detailRow('Designation', org['Designation'])}
                            ${detailRow('Contact Email', org['Contact Email'])}
                            ${detailRow('Phone', org['Phone'])}
                            ${detailRow('Address', org['Address'])}
                            ${detailRow('Organization Type', org['Organization Type'])}
                            ${detailRow('Account Manager', org['Account Manager'])}
                            ${detailRow('GST/Tax ID', org['GST/Tax ID'])}
                            ${detailRow('Deal Source', org['Deal Source'])}
                            ${detailRow('Licenses', org['Number of Licenses'])}
                            ${org['Secondary Contact'] ? detailRow('Secondary Contact', org['Secondary Contact']) : ''}
                            ${org['Secondary Email'] ? detailRow('Secondary Email', org['Secondary Email']) : ''}
                            ${org['Secondary Phone'] ? detailRow('Secondary Phone', org['Secondary Phone']) : ''}
                        </div>
                    </div>

                    <!-- Subscriptions -->
                    ${subs.map((sub, i) => {
                        const subExpiry = sub['Expiry Date'];
                        const subDays = subExpiry ? Utils.remainingDays(subExpiry) : null;
                        const subStatus = subExpiry ? Utils.statusBadge(subExpiry) : '';
                        const heading = subs.length > 1 ? `Subscription ${i + 1}` : 'Subscription Details';

                        return `
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">${heading}</h3>
                                ${subStatus}
                            </div>
                            <div class="detail-table">
                                ${detailRow('Type', sub['Subscription Type'])}
                                ${detailRow('Plan', sub['Plan Name'])}
                                ${detailRow('Start Date', Utils.formatDate(sub['Start Date']))}
                                ${detailRow('Expiry Date', Utils.formatDate(subExpiry))}
                                ${detailRow('Remaining', subDays !== null ? (subDays > 0 ? subDays + ' days' : Math.abs(subDays) + ' days overdue') : '—')}
                                ${detailRow('Billing Date', Utils.formatDate(sub['Billing Date']))}
                                ${detailRow('Payment Cycle', sub['Payment Cycle'])}
                                ${detailRow('Amount', sub['Amount'])}
                                ${detailRow('Currency', sub['Currency'])}
                                ${detailRow('Auto Renew', sub['Auto Renew'])}
                            </div>
                        </div>`;
                    }).join('')}

                    <!-- Add Subscription Button -->
                    <div style="text-align:center;margin-bottom:16px;">
                        <button class="btn btn-secondary" onclick="showAddSubscription()">+ Add Another Subscription</button>
                    </div>

                    <!-- Payment Summary -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Payment Summary</h3>
                            ${Utils.paymentStatusBadge(paySummary.status)}
                        </div>
                        <div class="payment-overview">
                            <div class="payment-stat">
                                <div class="payment-stat-value">${Utils.formatCurrency(paySummary.contractValue)}</div>
                                <div class="payment-stat-label">Contract Value</div>
                            </div>
                            <div class="payment-stat">
                                <div class="payment-stat-value" style="color:var(--success);">${Utils.formatCurrency(paySummary.totalPaid)}</div>
                                <div class="payment-stat-label">Total Paid</div>
                            </div>
                            <div class="payment-stat">
                                <div class="payment-stat-value" style="color:${paySummary.remaining > 0 ? 'var(--warning)' : 'var(--success)'};">${Utils.formatCurrency(paySummary.remaining)}</div>
                                <div class="payment-stat-label">Remaining</div>
                            </div>
                        </div>
                        ${paySummary.contractValue > 0 ? `
                        <div class="payment-progress-container">
                            <div class="payment-progress-bar" style="width:${paySummary.percentage}%"></div>
                        </div>
                        <div class="payment-progress-text">${paySummary.percentage}% Collected</div>
                        ` : ''}
                    </div>

                    <!-- Payment History -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Payment History</h3>
                            <button class="btn btn-sm btn-primary" onclick="showAddPayment()">+ Add Payment</button>
                        </div>
                        ${paymentHistory.length > 0 ? `
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th>Amount</th>
                                        <th>Method</th>
                                        <th>Receipt</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${paymentHistory.map(p => `
                                        <tr>
                                            <td>${Utils.escapeHtml(p.number)}</td>
                                            <td>${Utils.formatDate(p.date)}</td>
                                            <td>${Utils.escapeHtml(p.amount)}</td>
                                            <td>${Utils.escapeHtml(p.method)}</td>
                                            <td>${Utils.escapeHtml(p.receipt)}</td>
                                            <td>${p.status === 'Paid'
                                                ? '<span class="badge badge-success">Paid</span>'
                                                : p.status === 'Overdue'
                                                    ? '<span class="badge badge-error">Overdue</span>'
                                                    : '<span class="badge badge-warning">Due</span>'
                                            }</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        ` : '<p style="color:var(--text-muted);padding:12px 0;">No payment records yet. Click "Add Payment" to record a payment.</p>'}
                    </div>

                    <!-- Add Payment Form (hidden) -->
                    <div id="add-payment-form" class="card" style="display:none;">
                        <div class="card-header">
                            <h3 class="card-title">Record Payment</h3>
                            <button class="btn btn-text btn-sm" onclick="hideAddPayment()">Cancel</button>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Payment Date *</label>
                                <div class="date-input-wrapper">
                                    <input type="text" id="add-pay-date-display" class="date-display" placeholder="DD-MMM-YYYY" readonly />
                                    <input type="date" id="add-pay-date" onchange="onDateChange('add-pay-date')" class="date-hidden" />
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Amount *</label>
                                <input type="number" id="add-pay-amount" placeholder="e.g., 250000" min="0" />
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Payment Method</label>
                                <select id="add-pay-method">
                                    <option value="Bank Transfer">Bank Transfer</option>
                                    <option value="Cheque">Cheque</option>
                                    <option value="UPI">UPI</option>
                                    <option value="Credit Card">Credit Card</option>
                                    <option value="Cash">Cash</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Receipt/Invoice #</label>
                                <input type="text" id="add-pay-receipt" placeholder="e.g., INV-001" />
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="submitPayment()">Record Payment</button>
                    </div>

                    <!-- Alert Settings -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Alert Settings</h3>
                        </div>
                        <div class="detail-table">
                            ${detailRow('Alerts Enabled', alerts['Alerts Enabled'] || 'Yes')}
                            ${detailRow('Alert Days Before', alerts['Alert Days Before'] || '60')}
                            ${detailRow('Recipients', alerts['Alert Recipients'] || '—')}
                        </div>
                    </div>

                    <!-- Notes -->
                    ${notes ? `
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">Notes</h3></div>
                        <p style="color:var(--text-secondary);white-space:pre-wrap;">${Utils.escapeHtml(notes)}</p>
                    </div>` : ''}

                    <!-- Status Actions -->
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">Quick Actions</h3></div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn btn-sm ${hasRenewal ? 'btn-primary' : 'btn-secondary'}" onclick="setStatus('renewalInProgress')">🔄 Mark Renewal In Progress</button>
                            <button class="btn btn-sm btn-secondary" onclick="setStatus('active')">✅ Mark Active</button>
                            <button class="btn btn-sm btn-secondary" onclick="uploadDocument()">📄 Upload Document</button>
                        </div>
                        <input type="file" id="doc-file-input" accept=".pdf,.png,.jpg,.jpeg,.docx" style="display:none;" onchange="handleDocUpload(event)" />
                    </div>

                    <!-- Documents -->
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">Documents</h3></div>
                        <div id="documents-list">
                            ${renderDocuments()}
                        </div>
                    </div>

                    <!-- Audit Log -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Audit Log</h3>
                            <span class="badge badge-default">${currentIssue.comments.totalCount} entries</span>
                        </div>
                        <div id="audit-log">
                            ${currentIssue.comments.nodes.length === 0
                                ? '<p style="color:var(--text-muted);padding:12px 0;">No activity yet.</p>'
                                : currentIssue.comments.nodes.map(c => `
                                    <div class="audit-item">
                                        <div class="audit-content">${formatCommentBody(c.body)}</div>
                                        <div class="audit-meta">
                                            <span>${c.author?.login || 'unknown'}</span>
                                            <span>${Utils.timeAgo(c.createdAt)}</span>
                                        </div>
                                    </div>
                                `).join('')
                            }
                        </div>
                    </div>
                </div>
            `;
        }

        function detailRow(label, value) {
            return `
                <div class="detail-row">
                    <span class="detail-label">${Utils.escapeHtml(label)}</span>
                    <span class="detail-value">${Utils.escapeHtml(value || '—')}</span>
                </div>`;
        }

        function formatCommentBody(body) {
            // Simple markdown-like rendering
            return Utils.escapeHtml(body.substring(0, 300))
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function renderDocuments() {
            const docComments = currentIssue.comments.nodes.filter(c => c.body.startsWith('📄'));
            if (docComments.length === 0) {
                return '<p style="color:var(--text-muted);padding:12px 0;">No documents uploaded yet.</p>';
            }
            return docComments.map(c => `
                <div class="doc-item">
                    <span>📄</span>
                    <div class="doc-info">${formatCommentBody(c.body)}</div>
                    <span class="doc-time">${Utils.timeAgo(c.createdAt)}</span>
                </div>
            `).join('');
        }

        // Status change
        async function setStatus(statusKey) {
            const label = CONFIG.labels.status[statusKey];
            const currentLabels = currentIssue.labels.nodes.map(l => l.name);

            try {
                await GitHubAPI.updateStatusLabel(currentIssue.number, label, currentLabels);
                await GitHubAPI.addComment(currentIssue.number,
                    `✏️ **Status changed by ${Auth.getUserName()}** — ${Utils.formatDate(new Date().toISOString())}\n\nNew status: ${label}`
                );
                Toast.show('Status updated!', 'success');
                await loadOrganization();
            } catch (error) {
                Toast.show('Failed to update status: ' + error.message, 'error');
            }
        }

        // Delete
        function handleDelete() {
            Dialog.confirm(
                'Delete Organization',
                `Are you sure you want to delete "${currentIssue.title}"? This will close the GitHub issue.`,
                async () => {
                    try {
                        await GitHubAPI.deleteOrganization(currentIssue.number);
                        Toast.show('Organization deleted.', 'success');
                        setTimeout(() => window.location.href = '../organizations/', 1500);
                    } catch (error) {
                        Toast.show('Failed to delete: ' + error.message, 'error');
                    }
                }
            );
        }

        // Document upload
        function uploadDocument() {
            document.getElementById('doc-file-input').click();
        }

        async function handleDocUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > CONFIG.maxFileSize) {
                Toast.show('File too large. Max 25MB.', 'error');
                return;
            }

            Toast.show('Uploading document...', 'info');
            try {
                await GitHubAPI.uploadDocument(currentIssue.number, file);
                Toast.show('Document uploaded!', 'success');
                await loadOrganization();
            } catch (error) {
                Toast.show('Upload failed: ' + error.message, 'error');
            }
        }

        // Show/hide add payment form
        function showAddPayment() {
            document.getElementById('add-payment-form').style.display = 'block';
            document.getElementById('add-payment-form').scrollIntoView({ behavior: 'smooth' });
        }

        function hideAddPayment() {
            document.getElementById('add-payment-form').style.display = 'none';
        }

        // Submit payment — adds a comment and updates issue body
        async function submitPayment() {
            const date = document.getElementById('add-pay-date').value;
            const amount = document.getElementById('add-pay-amount').value;
            const method = document.getElementById('add-pay-method').value;
            const receipt = document.getElementById('add-pay-receipt').value.trim() || '—';

            if (!date || !amount) {
                Toast.show('Date and Amount are required.', 'error');
                return;
            }

            try {
                Toast.show('Recording payment...', 'info');

                // Add payment comment
                const userName = Auth.getUserName();
                const commentBody = `💰 **Payment recorded by ${userName}** — ${Utils.formatDate(new Date().toISOString())}\n\n| Field | Value |\n|-------|-------|\n| Date | ${date} |\n| Amount | $${parseFloat(amount).toLocaleString()} |\n| Method | ${method} |\n| Receipt | ${receipt} |`;

                await GitHubAPI.addComment(currentIssue.number, commentBody);
                Toast.show('Payment recorded!', 'success');
                hideAddPayment();
                await loadOrganization();
            } catch (error) {
                Toast.show('Failed to record payment: ' + error.message, 'error');
            }
        }

        // Date change handler for payment form
        function onDateChange(id) {
            const dateInput = document.getElementById(id);
            const displayInput = document.getElementById(id + '-display');
            if (dateInput && displayInput && dateInput.value) {
                displayInput.value = Utils.formatDate(dateInput.value);
            }
        }

        // Edit toggle (redirect to GitHub for now)
        function toggleEdit() {
            window.open(`https://github.com/${CONFIG.owner}/${CONFIG.repo}/issues/${currentIssue.number}`, '_blank');
        }

        // Add subscription
        function showAddSubscription() {
            Toast.show('Redirecting to GitHub to add subscription section...', 'info');
            window.open(`https://github.com/${CONFIG.owner}/${CONFIG.repo}/issues/${currentIssue.number}`, '_blank');
        }

        // Export PDF
        function exportOrgPDF() {
            Export.downloadOrgPDF(currentIssue, `${currentIssue.title.replace(/\s+/g, '-').toLowerCase()}-details.pdf`);
        }
    </script>

    <style>
        .detail-grid { display: flex; flex-direction: column; gap: 16px; }

        .detail-table { }
        .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            width: 180px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 13px;
            flex-shrink: 0;
        }
        .detail-value { font-size: 13px; color: var(--text); }

        .audit-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .audit-item:last-child { border-bottom: none; }
        .audit-content { font-size: 13px; line-height: 1.6; }
        .audit-meta {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .doc-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .doc-item:last-child { border-bottom: none; }
        .doc-info { flex: 1; font-size: 13px; }
        .doc-time { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

        .payment-overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        .payment-stat-value {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .payment-stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .payment-progress-container {
            width: 100%;
            height: 12px;
            background: var(--bg);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .payment-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #34D399);
            border-radius: 6px;
            transition: width 0.5s ease;
            min-width: 4px;
        }

        .payment-progress-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
            font-weight: 600;
        }

        .date-input-wrapper { position: relative; }
        .date-display { cursor: pointer; background: var(--bg-white) !important; padding-right: 40px !important; }
        .date-input-wrapper::after { content: '📅'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; z-index: 2; }
        .date-hidden { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 3; }
        .date-hidden::-webkit-calendar-picker-indicator { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; opacity: 0; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }

        @media (max-width: 768px) {
            .payment-overview { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .payment-stat-value { font-size: 18px; }
            .form-row { grid-template-columns: 1fr; }
            .detail-row { flex-direction: column; gap: 4px; }
            .detail-label { width: auto; }
        }
    </style>
</body>
</html>
