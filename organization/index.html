<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Detail — Subscription Manager</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header" id="app-header"></header>

    <div class="app-layout">
        <aside class="app-sidebar" id="app-nav"></aside>

        <main class="app-main">
            <div id="setup-banner"></div>
            <div id="org-detail" style="display:none;">
                <div class="loader"><div class="spinner"></div><p>Loading organization...</p></div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/github-api.js"></script>
    <script src="../js/export.js"></script>
    <script src="../lib/html2pdf.bundle.min.js" defer></script>

    <script>
        let currentIssue = null;
        let currentParsed = null;

        document.addEventListener('DOMContentLoaded', () => {
            Header.render([
                { label: 'Organizations', url: `${CONFIG.baseUrl}/organizations/` },
                { label: 'Detail' }
            ]);
            Nav.render('organizations');
            Auth.renderSetupBanner('setup-banner');
            if (Auth.isAuthenticated()) onAuthReady();
        });

        async function onAuthReady() {
            document.getElementById('org-detail').style.display = '';
            await loadOrganization();
        }

        async function loadOrganization() {
            const id = Utils.getQueryParam('id');
            if (!id) {
                document.getElementById('org-detail').innerHTML = '<div class="empty-state"><h3>No organization ID provided</h3><a href="../organizations/" class="btn btn-primary">Back to list</a></div>';
                return;
            }

            try {
                currentIssue = await GitHubAPI.getOrganization(parseInt(id));
                currentParsed = Utils.parseIssueBody(currentIssue.body);
                renderDetail();
            } catch (error) {
                document.getElementById('org-detail').innerHTML = `<div class="empty-state"><h3>Failed to load</h3><p>${Utils.escapeHtml(error.message)}</p><button class="btn btn-primary" onclick="loadOrganization()">Retry</button></div>`;
            }
        }

        function renderDetail() {
            const org = currentParsed.organization;
            const alerts = currentParsed.alerts;
            const plat = currentParsed.platform || currentParsed.subscriptions[0] || null;
            const projectBatches = currentParsed.projectBatches || [];
            const userBatches = currentParsed.userBatches || [];
            const legacySubs = currentParsed.subscriptions || [];
            const payment = currentParsed.payment || {};
            const paymentHistory = currentParsed.paymentHistory || [];
            const notes = currentParsed.notes;
            const expiryDate = Utils.getEarliestExpiry(currentParsed);
            const allExpiryItems = Utils.getAllExpiryItems(currentParsed);
            const hasRenewal = currentIssue.labels.nodes.some(l => l.name === CONFIG.labels.status.renewalInProgress);
            const days = expiryDate ? Utils.remainingDays(expiryDate) : null;
            const paySummary = Utils.calculatePaymentSummary(payment, paymentHistory);

            const statusHtml = hasRenewal
                ? `<span class="badge badge-info">${CONFIG.labels.status.renewalInProgress}</span>`
                : (expiryDate ? Utils.statusBadge(expiryDate) : '<span class="badge badge-default">Unknown</span>');

            const labelsHtml = currentIssue.labels.nodes
                .filter(l => !Object.values(CONFIG.labels.status).includes(l.name))
                .map(l => `<span class="badge badge-default">${Utils.escapeHtml(l.name)}</span>`)
                .join(' ');

            // Audit log (comments)
            const auditComments = currentIssue.comments.nodes.filter(c =>
                c.body.startsWith('✏️') || c.body.startsWith('🤖') || c.body.startsWith('📄') || c.body.startsWith('📧')
            );
            const otherComments = currentIssue.comments.nodes.filter(c =>
                !c.body.startsWith('✏️') && !c.body.startsWith('🤖') && !c.body.startsWith('📄') && !c.body.startsWith('📧')
            );

            document.getElementById('org-detail').innerHTML = `
                <!-- Header -->
                <div class="page-header">
                    <div>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <h1 class="page-title">${Utils.escapeHtml(currentIssue.title)}</h1>
                            ${statusHtml}
                        </div>
                        <p class="page-subtitle">
                            #${currentIssue.number} · Created ${Utils.formatDate(currentIssue.createdAt)}
                            ${days !== null ? ` · ${days > 0 ? days + ' days remaining' : Math.abs(days) + ' days overdue'}` : ''}
                        </p>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-secondary" onclick="exportOrgPDF()">Export PDF ⬇</button>
                        <a href="${currentIssue.html_url || `https://github.com/${CONFIG.owner}/${CONFIG.repo}/issues/${currentIssue.number}`}" target="_blank" class="btn btn-secondary">View on GitHub</a>
                        <button class="btn btn-secondary" onclick="toggleEdit()">Edit</button>
                        ${currentIssue.state === 'OPEN' ? `<button class="btn btn-danger" onclick="handleDelete()">Delete</button>` : ''}
                    </div>
                </div>

                <div class="detail-grid">
                    <!-- Organization Info -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Organization Details</h3>
                            ${labelsHtml}
                        </div>
                        <div class="detail-table">
                            ${detailRow('Contact Person', org['Contact Person'])}
                            ${detailRow('Designation', org['Designation'])}
                            ${detailRow('Contact Email', org['Contact Email'])}
                            ${detailRow('Phone', org['Phone'])}
                            ${detailRow('Address', org['Address'])}
                            ${detailRow('Organization Type', org['Organization Type'])}
                            ${detailRow('Account Manager', org['Account Manager'])}
                            ${detailRow('GST/Tax ID', org['GST/Tax ID'])}
                            ${detailRow('Deal Source', org['Deal Source'])}
                            ${detailRow('Licenses', org['Number of Licenses'])}
                            ${org['Secondary Contact'] ? detailRow('Secondary Contact', org['Secondary Contact']) : ''}
                            ${org['Secondary Email'] ? detailRow('Secondary Email', org['Secondary Email']) : ''}
                            ${org['Secondary Phone'] ? detailRow('Secondary Phone', org['Secondary Phone']) : ''}
                        </div>
                    </div>

                    <!-- Platform Subscription -->
                    ${plat ? `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Platform Subscription</h3>
                            ${plat['Expiry Date'] ? Utils.statusBadge(plat['Expiry Date']) : ''}
                        </div>
                        <div class="detail-table">
                            ${detailRow('Type', plat['Subscription Type'])}
                            ${plat['Custom Duration'] ? detailRow('Duration', plat['Custom Duration']) : ''}
                            ${detailRow('Plan', plat['Plan Name'])}
                            ${detailRow('Start Date', Utils.formatDate(plat['Start Date']))}
                            ${detailRow('Expiry Date', Utils.formatDate(plat['Expiry Date']))}
                            ${detailRow('Remaining', plat['Expiry Date'] ? (Utils.remainingDays(plat['Expiry Date']) > 0 ? Utils.remainingDays(plat['Expiry Date']) + ' days' : Math.abs(Utils.remainingDays(plat['Expiry Date'])) + ' days overdue') : '—')}
                            ${detailRow('Payment Cycle', plat['Payment Cycle'])}
                            ${detailRow('Amount', plat['Amount'])}
                            ${detailRow('Currency', plat['Currency'])}
                        </div>
                    </div>` : ''}

                    <!-- Project Batches -->
                    ${projectBatches.length > 0 ? `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Project Subscriptions</h3>
                            <span class="badge badge-default">${projectBatches.length} batch(es)</span>
                        </div>
                        <div class="table-container"><table>
                            <thead><tr><th>Batch</th><th>Projects</th><th>Start</th><th>Expiry</th><th>Days</th><th>Amount</th><th>Status</th></tr></thead>
                            <tbody>
                                ${projectBatches.map((b, i) => {
                                    const bExpiry = b['Expiry Date'];
                                    const bDays = bExpiry ? Utils.remainingDays(bExpiry) : null;
                                    return `<tr>
                                        <td><strong>Batch ${i+1}</strong></td>
                                        <td>${Utils.escapeHtml(b['Projects'] || '')}</td>
                                        <td>${Utils.formatDate(b['Start Date'])}</td>
                                        <td>${Utils.formatDate(bExpiry)}</td>
                                        <td>${bDays !== null ? (bDays > 0 ? bDays + 'd' : `<span style="color:var(--error)">${bDays}d</span>`) : '—'}</td>
                                        <td>${Utils.escapeHtml(b['Amount'] || '—')}</td>
                                        <td>${bExpiry ? Utils.statusBadge(bExpiry) : '—'}</td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table></div>
                        <div style="margin-top:12px;"><button class="btn btn-secondary btn-sm" onclick="showAddBatch('project')">+ Add Project Batch</button></div>
                    </div>` : ''}

                    <!-- User Batches -->
                    ${userBatches.length > 0 ? `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">User Subscriptions</h3>
                            <span class="badge badge-default">${userBatches.length} batch(es)</span>
                        </div>
                        <div class="table-container"><table>
                            <thead><tr><th>Batch</th><th>Users</th><th>Start</th><th>Expiry</th><th>Days</th><th>Amount</th><th>Status</th></tr></thead>
                            <tbody>
                                ${userBatches.map((b, i) => {
                                    const bExpiry = b['Expiry Date'];
                                    const bDays = bExpiry ? Utils.remainingDays(bExpiry) : null;
                                    return `<tr>
                                        <td><strong>Batch ${i+1}</strong></td>
                                        <td>${Utils.escapeHtml(b['Users'] || '')}</td>
                                        <td>${Utils.formatDate(b['Start Date'])}</td>
                                        <td>${Utils.formatDate(bExpiry)}</td>
                                        <td>${bDays !== null ? (bDays > 0 ? bDays + 'd' : `<span style="color:var(--error)">${bDays}d</span>`) : '—'}</td>
                                        <td>${Utils.escapeHtml(b['Amount'] || '—')}</td>
                                        <td>${bExpiry ? Utils.statusBadge(bExpiry) : '—'}</td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table></div>
                        <div style="margin-top:12px;"><button class="btn btn-secondary btn-sm" onclick="showAddBatch('user')">+ Add User Batch</button></div>
                    </div>` : ''}

                    <!-- Add batch buttons if no batches yet -->
                    ${projectBatches.length === 0 || userBatches.length === 0 ? `
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
                        ${projectBatches.length === 0 ? `<button class="btn btn-secondary btn-sm" onclick="showAddBatch('project')">+ Add Project Batch</button>` : ''}
                        ${userBatches.length === 0 ? `<button class="btn btn-secondary btn-sm" onclick="showAddBatch('user')">+ Add User Batch</button>` : ''}
                    </div>` : ''}

                    <!-- Payment Summary -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Payment Summary</h3>
                            ${Utils.paymentStatusBadge(paySummary.status)}
                        </div>
                        <div class="payment-overview">
                            <div class="payment-stat">
                                <div class="payment-stat-value">${Utils.formatCurrency(paySummary.contractValue)}</div>
                                <div class="payment-stat-label">Contract Value</div>
                            </div>
                            <div class="payment-stat">
                                <div class="payment-stat-value" style="color:var(--success);">${Utils.formatCurrency(paySummary.totalPaid)}</div>
                                <div class="payment-stat-label">Total Paid</div>
                            </div>
                            <div class="payment-stat">
                                <div class="payment-stat-value" style="color:${paySummary.remaining > 0 ? 'var(--warning)' : 'var(--success)'};">${Utils.formatCurrency(paySummary.remaining)}</div>
                                <div class="payment-stat-label">Remaining</div>
                            </div>
                        </div>
                        ${paySummary.contractValue > 0 ? `
                        <div class="payment-progress-container">
                            <div class="payment-progress-bar" style="width:${paySummary.percentage}%"></div>
                        </div>
                        <div class="payment-progress-text">${paySummary.percentage}% Collected</div>
                        ` : ''}
                    </div>

                    <!-- Payment History -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Payment History</h3>
                            <button class="btn btn-sm btn-primary" onclick="showAddPayment()">+ Add Payment</button>
                        </div>
                        ${paymentHistory.length > 0 ? `
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th>Amount</th>
                                        <th>Method</th>
                                        <th>Receipt</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${paymentHistory.map(p => `
                                        <tr>
                                            <td>${Utils.escapeHtml(p.number)}</td>
                                            <td>${Utils.formatDate(p.date)}</td>
                                            <td>${Utils.escapeHtml(p.amount)}</td>
                                            <td>${Utils.escapeHtml(p.method)}</td>
                                            <td>${Utils.escapeHtml(p.receipt)}</td>
                                            <td>${p.status === 'Paid'
                                                ? '<span class="badge badge-success">Paid</span>'
                                                : p.status === 'Overdue'
                                                    ? '<span class="badge badge-error">Overdue</span>'
                                                    : '<span class="badge badge-warning">Due</span>'
                                            }</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        ` : '<p style="color:var(--text-muted);padding:12px 0;">No payment records yet. Click "Add Payment" to record a payment.</p>'}
                    </div>

                    <!-- Add Payment Form (hidden) -->
                    <div id="add-payment-form" class="card" style="display:none;">
                        <div class="card-header">
                            <h3 class="card-title">Record Payment</h3>
                            <button class="btn btn-text btn-sm" onclick="hideAddPayment()">Cancel</button>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Payment Date *</label>
                                <div class="date-input-wrapper">
                                    <input type="text" id="add-pay-date-display" class="date-display" placeholder="DD-MMM-YYYY" readonly />
                                    <input type="date" id="add-pay-date" onchange="onDateChange('add-pay-date')" class="date-hidden" />
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Amount *</label>
                                <input type="number" id="add-pay-amount" placeholder="e.g., 250000" min="0" />
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Payment Method</label>
                                <select id="add-pay-method" onchange="toggleCustomMethod()">
                                    <option value="Bank Transfer">Bank Transfer</option>
                                    <option value="Cheque">Cheque</option>
                                    <option value="UPI">UPI</option>
                                    <option value="Credit Card">Credit Card</option>
                                    <option value="Cash">Cash</option>
                                    <option value="Other">Other (custom)</option>
                                </select>
                                <input type="text" id="add-pay-method-custom" placeholder="Enter payment method" style="display:none;margin-top:6px;" />
                            </div>
                            <div class="form-group">
                                <label>Receipt/Invoice #</label>
                                <input type="text" id="add-pay-receipt" placeholder="e.g., INV-001" />
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="submitPayment()">Record Payment</button>
                    </div>

                    <!-- Alert Settings -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Alert Settings</h3>
                        </div>
                        <div class="detail-table">
                            ${detailRow('Alerts Enabled', alerts['Alerts Enabled'] || 'Yes')}
                            ${detailRow('Alert Days Before', alerts['Alert Days Before'] || '60')}
                            ${detailRow('Recipients', alerts['Alert Recipients'] || '—')}
                        </div>
                    </div>

                    <!-- Notes -->
                    ${notes ? `
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">Notes</h3></div>
                        <p style="color:var(--text-secondary);white-space:pre-wrap;">${Utils.escapeHtml(notes)}</p>
                    </div>` : ''}

                    <!-- Status Actions -->
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">Quick Actions</h3></div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn btn-sm ${hasRenewal ? 'btn-primary' : 'btn-secondary'}" onclick="setStatus('renewalInProgress')">🔄 Mark Renewal In Progress</button>
                            <button class="btn btn-sm btn-secondary" onclick="setStatus('active')">✅ Mark Active</button>
                            <button class="btn btn-sm btn-secondary" onclick="uploadDocument()">📄 Upload Document</button>
                        </div>
                        <input type="file" id="doc-file-input" accept=".pdf,.png,.jpg,.jpeg,.docx" style="display:none;" onchange="handleDocUpload(event)" />
                    </div>

                    <!-- Documents -->
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">Documents</h3></div>
                        <div id="documents-list">
                            ${renderDocuments()}
                        </div>
                    </div>

                    <!-- Audit Log -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Audit Log</h3>
                            <span class="badge badge-default">${currentIssue.comments.totalCount} entries</span>
                        </div>
                        <div id="audit-log">
                            ${currentIssue.comments.nodes.length === 0
                                ? '<p style="color:var(--text-muted);padding:12px 0;">No activity yet.</p>'
                                : currentIssue.comments.nodes.map(c => `
                                    <div class="audit-item">
                                        <div class="audit-content">${formatCommentBody(c.body)}</div>
                                        <div class="audit-meta">
                                            <span>${c.author?.login || 'unknown'}</span>
                                            <span>${Utils.timeAgo(c.createdAt)}</span>
                                        </div>
                                    </div>
                                `).join('')
                            }
                        </div>
                    </div>
                </div>
            `;
        }

        function detailRow(label, value) {
            return `
                <div class="detail-row">
                    <span class="detail-label">${Utils.escapeHtml(label)}</span>
                    <span class="detail-value">${Utils.escapeHtml(value || '—')}</span>
                </div>`;
        }

        function formatCommentBody(body) {
            // Simple markdown-like rendering
            return Utils.escapeHtml(body.substring(0, 300))
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function renderDocuments() {
            const docComments = currentIssue.comments.nodes.filter(c => c.body.startsWith('📄'));
            if (docComments.length === 0) {
                return '<p style="color:var(--text-muted);padding:12px 0;">No documents uploaded yet.</p>';
            }
            return docComments.map(c => `
                <div class="doc-item">
                    <span>📄</span>
                    <div class="doc-info">${formatCommentBody(c.body)}</div>
                    <span class="doc-time">${Utils.timeAgo(c.createdAt)}</span>
                </div>
            `).join('');
        }

        // Status change
        async function setStatus(statusKey) {
            const label = CONFIG.labels.status[statusKey];
            const currentLabels = currentIssue.labels.nodes.map(l => l.name);

            try {
                await GitHubAPI.updateStatusLabel(currentIssue.number, label, currentLabels);
                await GitHubAPI.addComment(currentIssue.number,
                    `✏️ **Status changed by ${Auth.getUserName()}** — ${Utils.formatDate(new Date().toISOString())}\n\nNew status: ${label}`
                );
                Toast.show('Status updated!', 'success');
                await loadOrganization();
            } catch (error) {
                Toast.show('Failed to update status: ' + error.message, 'error');
            }
        }

        // Delete
        function handleDelete() {
            Dialog.confirm(
                'Delete Organization',
                `Are you sure you want to delete "${currentIssue.title}"? This will close the GitHub issue.`,
                async () => {
                    try {
                        await GitHubAPI.deleteOrganization(currentIssue.number);
                        Toast.show('Organization deleted.', 'success');
                        setTimeout(() => window.location.href = '../organizations/', 1500);
                    } catch (error) {
                        Toast.show('Failed to delete: ' + error.message, 'error');
                    }
                }
            );
        }

        // Document upload
        function uploadDocument() {
            document.getElementById('doc-file-input').click();
        }

        async function handleDocUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > CONFIG.maxFileSize) {
                Toast.show('File too large. Max 25MB.', 'error');
                return;
            }

            Toast.show('Uploading document...', 'info');
            try {
                await GitHubAPI.uploadDocument(currentIssue.number, file);
                Toast.show('Document uploaded!', 'success');
                await loadOrganization();
            } catch (error) {
                Toast.show('Upload failed: ' + error.message, 'error');
            }
        }

        // Show/hide add payment form
        function showAddPayment() {
            document.getElementById('add-payment-form').style.display = 'block';
            document.getElementById('add-payment-form').scrollIntoView({ behavior: 'smooth' });
        }

        function hideAddPayment() {
            document.getElementById('add-payment-form').style.display = 'none';
        }

        // Submit payment — updates installment row in issue body + recalculates totals + audit comment
        async function submitPayment() {
            const date = document.getElementById('add-pay-date').value;
            const amount = document.getElementById('add-pay-amount').value;
            const methodSelect = document.getElementById('add-pay-method').value;
            const method = methodSelect === 'Other'
                ? (document.getElementById('add-pay-method-custom').value.trim() || 'Other')
                : methodSelect;
            const receipt = document.getElementById('add-pay-receipt').value.trim() || '—';

            if (!date || !amount) {
                Toast.show('Date and Amount are required.', 'error');
                return;
            }

            const paidAmount = parseFloat(amount);
            if (isNaN(paidAmount) || paidAmount <= 0) {
                Toast.show('Please enter a valid amount.', 'error');
                return;
            }

            try {
                Toast.show('Recording payment...', 'info');

                const org = currentParsed.organization;
                const plat = currentParsed.platform || currentParsed.subscriptions[0] || {};
                const payment = currentParsed.payment || {};
                const payHistory = [...(currentParsed.paymentHistory || [])];
                const alerts = currentParsed.alerts;
                const notes = currentParsed.notes;

                // Find the first "Due" installment and update it to "Paid"
                let updatedExisting = false;
                for (const p of payHistory) {
                    if (p.status === 'Due') {
                        p.date = date;
                        const currSymbol = Utils.getCurrencySymbol(plat['Currency']);
                        p.amount = currSymbol + paidAmount.toLocaleString();
                        p.method = method;
                        p.receipt = receipt;
                        p.status = 'Paid';
                        updatedExisting = true;
                        break;
                    }
                }

                // If no "Due" installment found (one-time or all paid), add a new row
                if (!updatedExisting) {
                    const currSymbol2 = Utils.getCurrencySymbol(plat['Currency']);
                    payHistory.push({
                        number: String(payHistory.length + 1),
                        date: date,
                        amount: currSymbol2 + paidAmount.toLocaleString(),
                        method: method,
                        receipt: receipt,
                        status: 'Paid'
                    });
                }

                // Recalculate totals from history
                const contractValue = parseFloat((payment['Contract Value'] || '0').replace(/[^0-9.]/g, '')) || 0;
                let totalPaid = 0;
                for (const p of payHistory) {
                    if (p.status === 'Paid') {
                        totalPaid += parseFloat((p.amount || '0').replace(/[^0-9.]/g, '')) || 0;
                    }
                }
                const remaining = Math.max(0, contractValue - totalPaid);

                // Determine payment status
                let payStatus = 'Due';
                if (contractValue > 0 && totalPaid >= contractValue) payStatus = 'Fully Paid';
                else if (totalPaid > 0) payStatus = 'Partially Paid';

                // Check for overdue — only "Due" rows with past dates
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                for (const p of payHistory) {
                    if (p.status === 'Due' && p.date && p.date !== '—') {
                        const dueDate = new Date(p.date + 'T00:00:00');
                        if (dueDate < today) {
                            payStatus = 'Overdue';
                            break;
                        }
                    }
                }

                // Rebuild issue body preserving all data
                const orgData = buildOrgDataFromParsed(currentParsed, currentIssue);
                const subTypes = buildSubTypesFromParsed(currentParsed);

                const paymentData = {
                    contractValue: payment['Contract Value'] || '',
                    schedule: payment['Payment Schedule'] || 'One-time',
                    totalPaid: Utils.getCurrencySymbol(plat['Currency']) + totalPaid.toFixed(2).replace(/\.00$/, ''),
                    remaining: Utils.getCurrencySymbol(plat['Currency']) + remaining.toFixed(2).replace(/\.00$/, ''),
                    status: payStatus
                };

                const alertData = {
                    enabled: alerts['Alerts Enabled'] || 'Yes',
                    daysBefore: alerts['Alert Days Before'] || '60',
                    recipients: alerts['Alert Recipients'] || ''
                };

                // Build body without auto-generated history
                let newBody = Utils.buildIssueBody(orgData, subTypes, paymentData, alertData, notes);

                // Remove auto-generated Payment History (from buildIssueBody installment generation)
                newBody = newBody.replace(/\n## Payment History\n[\s\S]*?(?=\n## |$)/, '');

                // Insert actual payment history before Alert Settings
                const historySection = `\n## Payment History\n| # | Date | Amount | Method | Receipt | Status |\n|---|------|--------|--------|---------|--------|\n` +
                    payHistory.map(p => `| ${p.number} | ${p.date} | ${p.amount} | ${p.method} | ${p.receipt} | ${p.status} |`).join('\n') + '\n';

                const alertIdx = newBody.indexOf('\n## Alert Settings');
                if (alertIdx !== -1) {
                    newBody = newBody.slice(0, alertIdx) + historySection + newBody.slice(alertIdx);
                } else {
                    newBody += historySection;
                }

                // Update issue body
                await GitHubAPI.updateOrganization(currentIssue.number, { body: newBody });

                // Add audit comment
                const userName = Auth.getUserName();
                const cs = Utils.getCurrencySymbol(plat['Currency']);
                const commentBody = `💰 **Payment recorded by ${userName}** — ${Utils.formatDate(new Date().toISOString())}\n\n| Field | Value |\n|-------|-------|\n| Date | ${Utils.formatDate(date)} |\n| Amount | ${cs}${paidAmount.toLocaleString()} |\n| Method | ${method} |\n| Receipt | ${receipt} |\n\n**Updated Totals:** Paid: ${cs}${totalPaid.toLocaleString()} | Remaining: ${cs}${remaining.toLocaleString()} | Status: ${payStatus}`;

                await GitHubAPI.addComment(currentIssue.number, commentBody);

                Toast.show(`Payment of ${cs}${paidAmount.toLocaleString()} recorded! Remaining: ${cs}${remaining.toLocaleString()}`, 'success');
                hideAddPayment();
                await loadOrganization();
            } catch (error) {
                Toast.show('Failed to record payment: ' + error.message, 'error');
            }
        }

        // ─── Helper: rebuild subTypes object from parsed data ──────
        function buildSubTypesFromParsed(parsed) {
            const subTypes = { platform: null, projectBatches: [], userBatches: [] };

            if (parsed.platform) {
                const p = parsed.platform;
                subTypes.platform = {
                    type: p['Subscription Type'] || '', customDuration: p['Custom Duration'] ? p['Custom Duration'].replace(' months', '') : '',
                    planName: p['Plan Name'] || '', startDate: p['Start Date'] || '', expiryDate: p['Expiry Date'] || '',
                    billingDate: p['Billing Date'] || '', paymentCycle: p['Payment Cycle'] || '',
                    amount: p['Amount'] || '', currency: p['Currency'] || 'USD', autoRenew: p['Auto Renew'] || 'No'
                };
            }

            (parsed.projectBatches || []).forEach(b => {
                subTypes.projectBatches.push({
                    projects: b['Projects'] || '', startDate: b['Start Date'] || '', expiryDate: b['Expiry Date'] || '',
                    amount: b['Amount'] || '', currency: b['Currency'] || 'USD', paymentCycle: b['Payment Cycle'] || ''
                });
            });

            (parsed.userBatches || []).forEach(b => {
                subTypes.userBatches.push({
                    users: b['Users'] || '', startDate: b['Start Date'] || '', expiryDate: b['Expiry Date'] || '',
                    amount: b['Amount'] || '', currency: b['Currency'] || 'USD', paymentCycle: b['Payment Cycle'] || ''
                });
            });

            // Fallback: legacy subscriptions as platform
            if (!subTypes.platform && !subTypes.projectBatches.length && !subTypes.userBatches.length && parsed.subscriptions && parsed.subscriptions.length > 0) {
                const s = parsed.subscriptions[0];
                subTypes.platform = {
                    type: s['Subscription Type'] || '', customDuration: s['Custom Duration'] ? s['Custom Duration'].replace(' months', '') : '',
                    planName: s['Plan Name'] || '', startDate: s['Start Date'] || '', expiryDate: s['Expiry Date'] || '',
                    billingDate: s['Billing Date'] || '', paymentCycle: s['Payment Cycle'] || '',
                    amount: s['Amount'] || '', currency: s['Currency'] || 'USD', autoRenew: s['Auto Renew'] || 'No'
                };
            }

            return subTypes;
        }

        async function saveNewBatch(batchType) {
            const isProject = batchType === 'project';
            const names = document.getElementById(isProject ? 'new-proj-names' : 'new-user-range').value.trim();
            const start = document.getElementById('new-batch-start').value;
            const expiry = document.getElementById('new-batch-expiry').value;

            if (!names || !start || !expiry) { Toast.show('All fields are required.', 'error'); return; }

            try {
                Toast.show('Adding batch...', 'info');

                const plat = currentParsed.platform || currentParsed.subscriptions[0] || {};
                const currency = plat['Currency'] || 'USD';
                const currSym = Utils.getCurrencySymbol(currency);
                const amountVal = document.getElementById('new-batch-amount').value;

                const newBatch = isProject ? {
                    projects: names, startDate: start, expiryDate: expiry,
                    amount: amountVal ? currSym + amountVal : '', currency: currency,
                    paymentCycle: document.getElementById('new-batch-cycle').value === 'Other' ? (document.getElementById('new-batch-cycle-months').value ? document.getElementById('new-batch-cycle-months').value + ' months' : 'Custom') : document.getElementById('new-batch-cycle').value
                } : {
                    users: names, startDate: start, expiryDate: expiry,
                    amount: amountVal ? currSym + amountVal : '', currency: currency,
                    paymentCycle: document.getElementById('new-batch-cycle').value === 'Other' ? (document.getElementById('new-batch-cycle-months').value ? document.getElementById('new-batch-cycle-months').value + ' months' : 'Custom') : document.getElementById('new-batch-cycle').value
                };

                // Rebuild with new batch added
                const subTypes = buildSubTypesFromParsed(currentParsed);
                if (isProject) subTypes.projectBatches.push(newBatch);
                else subTypes.userBatches.push(newBatch);

                const orgData = buildOrgDataFromParsed(currentParsed, currentIssue);
                const paymentData = buildPaymentDataFromParsed(currentParsed, plat);
                const alertData = { enabled: currentParsed.alerts['Alerts Enabled'] || 'Yes', daysBefore: currentParsed.alerts['Alert Days Before'] || '60', recipients: currentParsed.alerts['Alert Recipients'] || '' };

                const newBody = Utils.buildIssueBody(orgData, subTypes, paymentData, alertData, currentParsed.notes);
                await GitHubAPI.updateOrganization(currentIssue.number, { body: newBody });

                const userName = Auth.getUserName();
                await GitHubAPI.addComment(currentIssue.number, `✏️ **${isProject ? 'Project' : 'User'} batch added by ${userName}** — ${Utils.formatDate(new Date().toISOString())}\n\n${isProject ? 'Projects' : 'Users'}: ${names}\nPeriod: ${start} to ${expiry}`);

                Toast.show('Batch added!', 'success');
                await loadOrganization();
            } catch (error) {
                Toast.show('Failed: ' + error.message, 'error');
            }
        }

        async function saveEdit() {
            const orgData = {
                name: document.getElementById('edit-name').value.trim(),
                email: document.getElementById('edit-email').value.trim(),
                phone: document.getElementById('edit-phone').value.trim(),
                address: document.getElementById('edit-address').value.trim(),

                secondaryContact: document.getElementById('edit-sec-name').value.trim(),
                secondaryEmail: document.getElementById('edit-sec-email').value.trim(),
                secondaryPhone: document.getElementById('edit-sec-phone').value.trim(),
                gstId: document.getElementById('edit-gst').value.trim(),
                dealSource: document.getElementById('edit-deal-source').value,
                licenses: document.getElementById('edit-licenses').value
            };

            const editSubType = document.getElementById('edit-sub-type').value;
            const editCustomDuration = document.getElementById('edit-custom-duration').value;

            const subData = {
                type: editSubType,
                customDuration: editSubType === 'Custom' ? editCustomDuration : '',
                planName: document.getElementById('edit-plan').value.trim(),
                startDate: document.getElementById('edit-start').value,
                expiryDate: document.getElementById('edit-expiry').value,
                billingDate: document.getElementById('edit-billing').value,
                paymentCycle: document.getElementById('edit-cycle').value === 'Other' ? (document.getElementById('edit-cycle-months').value ? document.getElementById('edit-cycle-months').value + ' months' : 'Custom') : document.getElementById('edit-cycle').value,
                amount: document.getElementById('edit-amount').value,
                currency: document.getElementById('edit-currency').value,
                autoRenew: 'No'
            };

            const paymentData = {
                contractValue: document.getElementById('edit-contract-value').value,
                schedule: document.getElementById('edit-pay-schedule').value,
                totalPaid: currentParsed.payment?.['Total Paid'] || Utils.getCurrencySymbol((currentParsed.platform || currentParsed.subscriptions[0] || {})['Currency']) + '0',
                remaining: currentParsed.payment?.['Remaining'] || '',
                status: currentParsed.payment?.['Payment Status'] || 'Due'
            };

            const alertData = {
                enabled: document.getElementById('edit-alert-enabled').value,
                daysBefore: document.getElementById('edit-alert-days').value,
                recipients: document.getElementById('edit-alert-recipients').value.trim()
            };

            const notes = document.getElementById('edit-notes').value.trim();

            if (!orgData.name) { Toast.show('Organization name is required.', 'error'); return; }

            try {
                Toast.show('Saving changes...', 'info');

                // Rebuild with edited platform + preserved batches
                const subTypes = buildSubTypesFromParsed(currentParsed);
                // Update platform with edited values
                subTypes.platform = subData;

                const newBody = Utils.buildIssueBody(orgData, subTypes, paymentData, alertData, notes);

                // Build audit comment — find what changed
                const changes = [];
                const oldOrg = currentParsed.organization;
                const oldSub = currentParsed.platform || currentParsed.subscriptions[0] || {};
                const fieldMap = [
                    ['Organization Name', orgData.name, oldOrg['Organization Name'] || currentIssue.title],
                    ['Contact Email', orgData.email, oldOrg['Contact Email']],
                    ['Phone', orgData.phone, oldOrg['Phone']],
                    ['Organization Type', orgData.orgType, oldOrg['Organization Type']],
                    ['Account Manager', orgData.accountManager, oldOrg['Account Manager']],
                    ['Expiry Date', subData.expiryDate, oldSub['Expiry Date']],
                    ['Amount', subData.amount, oldSub['Amount']],
                    ['Contract Value', paymentData.contractValue, currentParsed.payment?.['Contract Value']],
                ];
                for (const [field, newVal, oldVal] of fieldMap) {
                    if (newVal !== (oldVal || '') && (newVal || oldVal)) {
                        changes.push(`| ${field} | ${oldVal || '—'} | ${newVal || '—'} |`);
                    }
                }

                // Update the issue
                await GitHubAPI.updateOrganization(currentIssue.number, {
                    title: orgData.name,
                    body: newBody
                });

                // Update labels
                const newStatus = Utils.getStatus(subData.expiryDate);
                const newStatusLabel = Utils.getStatusLabel(newStatus);
                const currentLabels = currentIssue.labels.nodes.map(l => l.name);
                await GitHubAPI.updateStatusLabel(currentIssue.number, newStatusLabel, currentLabels);

                // Add type label
                if (subData.type) {
                    const typeLabels = ['Annual', 'Monthly', 'Quarterly', 'Custom'];
                    for (const tl of typeLabels) {
                        if (currentLabels.includes(tl) && tl !== subData.type) {
                            await GitHubAPI.removeLabel(currentIssue.number, tl);
                        }
                    }
                    await GitHubAPI.addLabels(currentIssue.number, [subData.type]);
                }

                // Add audit comment
                if (changes.length > 0) {
                    const userName = Auth.getUserName();
                    const auditBody = `✏️ **Updated by ${userName}** — ${Utils.formatDate(new Date().toISOString())}\n\n| Field | Old Value | New Value |\n|-------|-----------|----------|\n${changes.join('\n')}`;
                    await GitHubAPI.addComment(currentIssue.number, auditBody);
                }

                Toast.show('Changes saved!', 'success');
                isEditing = false;
                await loadOrganization();
            } catch (error) {
                Toast.show('Failed to save: ' + error.message, 'error');
            }
        }

        // Old showAddSubscription/saveNewSubscription replaced by showAddBatch/saveNewBatch above

        // Export PDF
        function exportOrgPDF() {
            Export.downloadOrgPDF(currentIssue, `${currentIssue.title.replace(/\s+/g, '-').toLowerCase()}-details.pdf`);
        }
    </script>
